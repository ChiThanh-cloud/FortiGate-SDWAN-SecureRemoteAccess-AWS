  <rect x="1010" y="420" width="210" height="55" rx="6" fill="#fff" stroke="#6aa84f" stroke-width="1.5"/><text x="1115" y="443" text-anchor="middle" class="small bold">FortiClient - iPhone</text><text x="1115" y="463" text-anchor="middle" class="small">Tunnel IP: 10.212.134.x</text>
