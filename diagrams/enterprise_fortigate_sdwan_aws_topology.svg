  <g fill="#d71920"><rect x="542" y="345" width="10" height="10"/><rect x="558" y="345" width="10" height="10"/><rect x="574" y="345" width="10" height="10"/><rect x="542" y="361" width="10" height="10"/><rect x="574" y="361" width="10" height="10"/><rect x="542" y="377" width="10" height="10"/><rect x="558" y="377" width="10" height="10"/><rect x="574" y="377" width="10" height="10"/></g>

