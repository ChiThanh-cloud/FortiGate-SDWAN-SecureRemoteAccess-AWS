  <rect x="380" y="645" width="455" height="105" rx="8" fill="#eef7ff" stroke="#3c78d8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="607" y="670" text-anchor="middle" class="boxTitle">SD-WAN Logic</text><text x="607" y="693" text-anchor="middle" class="small">Zone: <tspan class="bold">virtual-wan-link</tspan> • Members: port1, port2</text><text x="607" y="716" text-anchor="middle" class="small">Performance SLA: 8.8.8.8 / 1.1.1.1</text><text x="607" y="738" text-anchor="middle" class="small">Failover: WAN1 → WAN2</text>

  <rect x="55" y="510" width="210" height="170" rx="8" fill="#fff" stroke="#d71920" stroke-width="2"/>
  <text x="75" y="535" class="boxTitle">Key Security Policies</text><text x="75" y="562" class="small">• LAN_to_Internet: NAT via SD-WAN</text><text x="75" y="586" class="small">• SSLVPN_to_LAN: no NAT</text><text x="75" y="610" class="small">• SSLVPN_to_Internet: NAT</text><text x="75" y="634" class="small">• UTM: Web Filter / App Control</text><text x="75" y="658" class="small">• Logs: Forward Traffic / Security Events</text>

  <rect x="320" y="780" width="610" height="85" rx="8" fill="#f7fbff" stroke="#4f81bd" stroke-width="2"/>
  <text x="625" y="807" text-anchor="middle" class="boxTitle">Operational Validation</text><text x="625" y="835" text-anchor="middle" class="small">DNS → ZeroSSL → SD-WAN SLA → Routing → NAT/session logs → SSL-VPN session → IPsec status → Employee test</text>
  <rect x="320" y="890" width="610" height="70" rx="8" fill="#fffaf0" stroke="#f1a208" stroke-width="2"/>
  <text x="625" y="918" text-anchor="middle" class="boxTitle">Future Enterprise Roadmap</text><text x="625" y="945" text-anchor="middle" class="small">AD/LDAP • AD group mapping • Split tunnel by group • Azure ↔ Forti IPsec</text>

